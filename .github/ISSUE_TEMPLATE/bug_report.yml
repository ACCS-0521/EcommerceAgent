name: Bug report
description: 报告可复现的功能异常
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: 感谢反馈。请勿在 Issue 中粘贴 API Key、订单隐私数据或其他敏感信息。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清楚说明实际发生了什么。
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 启动后端和前端
        2. 输入……
        3. 观察到……
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 运行环境
      placeholder: macOS 15 / Node.js 22 / pnpm 11
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 脱敏后的日志或截图
      description: 请移除 API Key、用户身份信息和订单隐私数据。
      render: shell
