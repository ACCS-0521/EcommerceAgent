name: Feature request
description: 提议符合当前项目阶段的新功能
title: "[Feature]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: 当前项目优先保持 MVP 简洁，请说明功能解决的具体问题。

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议方案
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 影响范围
      options:
        - Agent / Tool Calling
        - Express API
        - React UI
        - Mock 数据
        - 测试与工程化
        - 文档
    validations:
      required: true

  - type: checkboxes
    id: scope
    attributes:
      label: MVP 边界确认
      options:
        - label: 该建议不要求引入数据库、登录、RAG、后台管理或多 Agent。
          required: true
